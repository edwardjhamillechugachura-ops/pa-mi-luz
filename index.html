<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturno - Anillo de Palabras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="romanticTitle">Para ti, mi amor luz te adoro💖✨🌹#15👑💕</h1>

    <div id="musicControls">
        <button id="musicBtn">🎵 Reproducir Música</button>
    </div>
    <div id="ytPlayer"></div>

    <div id="errorBox" style="display:none; position:fixed; top:0; left:0; width:100%; padding:20px; box-sizing:border-box; background:rgba(150,0,0,0.9); color:white; font-family:monospace; font-size:14px; z-index:9999; white-space:pre-wrap;"></div>

    <script>
        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.style.display = 'block';
            box.textContent = '⚠️ ' + msg;
        }
        window.addEventListener('error', (e) => showError('Error: ' + (e.message || e.error)));
        window.addEventListener('unhandledrejection', (e) => showError('Error de carga: ' + (e.reason && e.reason.message ? e.reason.message : e.reason)));

        // Verificación básica de soporte WebGL antes de cargar three.js
        try {
            const testCanvas = document.createElement('canvas');
            const gl = testCanvas.getContext('webgl') || testCanvas.getContext('experimental-webgl');
            if (!gl) showError('Este navegador no soporta WebGL, por eso no se puede mostrar Saturno. Prueba abriendo el archivo en Chrome o Safari en lugar del navegador integrado de la app donde lo abriste.');
        } catch (e) {
            showError('No se pudo verificar WebGL: ' + e.message);
        }
    </script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        import './script.js';

        try {

        // 1. CONFIGURACIÓN
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 2, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 2. LUCES
        const ambientLight = new THREE.AmbientLight(0x222244, 0.4); 
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 2.0);
        sunLight.position.set(5, 2, 3);
        scene.add(sunLight);

        const systemGroup = new THREE.Group();
        systemGroup.rotation.z = 0.46; 
        scene.add(systemGroup);

        // 3. PLANETA
        const planetGeometry = new THREE.SphereGeometry(1.5, 64, 64);
        const pCanvas = document.createElement('canvas');
        pCanvas.width = 1024; pCanvas.height = 512;
        const pCtx = pCanvas.getContext('2d');
        
        const pGrad = pCtx.createLinearGradient(0, 0, 0, 512);
        pGrad.addColorStop(0, '#e8d5a3'); pGrad.addColorStop(0.3, '#c9a96e');
        pGrad.addColorStop(0.5, '#dcc58e'); pGrad.addColorStop(0.7, '#b89558');
        pGrad.addColorStop(1, '#e8d5a3');
        pCtx.fillStyle = pGrad;
        pCtx.fillRect(0, 0, 1024, 512);

        for(let i=0; i<40; i++) {
            pCtx.fillStyle = `rgba(160, 120, 60, ${Math.random() * 0.4 + 0.1})`;
            pCtx.fillRect(0, Math.random() * 512, 1024, Math.random() * 20 + 5);
        }

        const planetTexture = new THREE.CanvasTexture(pCanvas);
        const planetMaterial = new THREE.MeshStandardMaterial({ map: planetTexture, roughness: 0.8, metalness: 0.1 });
        const planet = new THREE.Mesh(planetGeometry, planetMaterial);
        systemGroup.add(planet); 

        const glowGeometry = new THREE.SphereGeometry(1.55, 64, 64);
        const glowMaterial = new THREE.MeshBasicMaterial({ color: 0xffcc88, transparent: true, opacity: 0.15, side: THREE.BackSide });
        const atmosphere = new THREE.Mesh(glowGeometry, glowMaterial);
        systemGroup.add(atmosphere);

        // 4. ANILLO FÍSICO + PALABRAS QUE FLOTAN SOBRE ÉL
        const ringGroup = new THREE.Group();
        ringGroup.rotation.x = -Math.PI / 2; 

        // A. Anillo físico base (bandas C, B, división Cassini, A)
        const RING_TEX_W = 2048;
        const RING_TEX_H = 128;
        const rCanvas = document.createElement('canvas');
        rCanvas.width = RING_TEX_W; rCanvas.height = RING_TEX_H;
        const rCtx = rCanvas.getContext('2d');

        rCtx.clearRect(0, 0, RING_TEX_W, RING_TEX_H);
        rCtx.fillStyle = 'rgba(180, 170, 150, 0.25)';
        rCtx.fillRect(0, 20, RING_TEX_W, 24);               // Anillo C
        rCtx.fillStyle = 'rgba(210, 200, 180, 0.5)';
        rCtx.fillRect(0, 44, RING_TEX_W, 36);                // Anillo B
        rCtx.clearRect(0, 80, RING_TEX_W, 8);                // División Cassini
        rCtx.fillStyle = 'rgba(200, 190, 170, 0.4)';
        rCtx.fillRect(0, 88, RING_TEX_W, 28);                // Anillo A

        for (let i = 0; i < 1500; i++) {
            rCtx.fillStyle = `rgba(255,255,255,${Math.random() * 0.25})`;
            rCtx.fillRect(Math.random() * RING_TEX_W, 20 + Math.random() * 96, Math.random() * 2, Math.random() * 2);
        }

        const ringTexture = new THREE.CanvasTexture(rCanvas);
        const ringGeo = new THREE.RingGeometry(2.0, 4.5, 128);
        const ringMat = new THREE.MeshBasicMaterial({ 
            map: ringTexture, 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: 0.9,
            depthWrite: false
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ringGroup.add(ring);

        // B. PALABRAS QUE FLOTAN ALREDEDOR DEL ANILLO
        const words = [
            "Te amo 💖", "Mi amor eterno ❤️", "Mi corazón te elige 💞",
            "Eres mi cielo ☁️", "Siempre contigo 🌙", "Mi lugar seguro 🌸",
            "Tu voz me enamora 🎶", "Bésame una vez más 💋", "Eres mi sueño ✨",
            "Tu mirada ilumina 🌟", "Mi paz en ti 🌿", "Nuestro amor florece 🌹",
            "Mi dulce hogar 🏡", "Te pienso siempre 💭", "Mi universo en ti 🌌",
            "Nuestras flores 💐", "Mi alma te busca 💫", "Eres mi razón 💘"
        ];

        const pinkColor = new THREE.Color(0xff3aa0); 
        const textSprites = [];
        const numWords = 260;

        function createTextTexture(text, color) {
            const c = document.createElement('canvas');
            c.width = 512; c.height = 128;
            const cx = c.getContext('2d');
            cx.clearRect(0, 0, 512, 128);

            cx.font = 'bold 44px "Segoe UI Emoji", "Apple Color Emoji", Arial, sans-serif';
            cx.textAlign = 'center';
            cx.textBaseline = 'middle';

            // Doble resplandor para que las letras se noten mucho más
            cx.shadowColor = color;
            cx.shadowBlur = 30;
            cx.fillStyle = color;
            cx.fillText(text, 256, 64);
            cx.fillText(text, 256, 64);

            // Contorno claro para nitidez
            cx.shadowBlur = 0;
            cx.lineWidth = 1.5;
            cx.strokeStyle = 'rgba(255,255,255,0.5)';
            cx.strokeText(text, 256, 64);

            return new THREE.CanvasTexture(c);
        }

        for (let i = 0; i < numWords; i++) {
            const word = words[Math.floor(Math.random() * words.length)];

            let radius;
            const ringChoice = Math.random();
            if (ringChoice < 0.15) { 
                radius = 2.1 + Math.random() * 0.5; // Anillo C
            } else if (ringChoice < 0.65) { 
                radius = 2.8 + Math.random() * 0.6; // Anillo B (denso)
            } else { 
                radius = 3.9 + Math.random() * 0.5; // Anillo A
            }

            const angle = Math.random() * Math.PI * 2;

            // Coordenadas LOCALES en el mismo plano que usa el RingGeometry
            const localX = Math.cos(angle) * radius;
            const localY = Math.sin(angle) * radius;

            const colorVariation = Math.random() * 0.15;
            const spriteColor = pinkColor.clone();
            spriteColor.g += colorVariation * 0.2; 

            const texture = createTextTexture(word, `#${spriteColor.getHexString()}`);
            const material = new THREE.MeshBasicMaterial({ 
                map: texture, 
                transparent: true, 
                opacity: 0.95, 
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending, 
                depthWrite: false
            });

            const scale = 0.35 + Math.random() * 0.55;
            const w = scale * 2.1, h = scale * 0.55;
            const planeGeo = new THREE.PlaneGeometry(w, h);
            const mesh = new THREE.Mesh(planeGeo, material);

            // Levanta el plano para que quede parado (de pie) en vez de acostado
            mesh.rotation.x = Math.PI / 2;
            const baseZ = h / 2 + Math.random() * 0.03;
            mesh.position.z = baseZ;

            // Grupo que ubica y orienta la palabra sobre el anillo (rota tangente al círculo)
            const wordGroup = new THREE.Group();
            wordGroup.position.set(localX, localY, 0);
            wordGroup.rotation.z = angle + Math.PI / 2;
            wordGroup.add(mesh);

            // Datos para la animación de flotación (leve, hacia arriba/abajo, de pie)
            wordGroup.userData.mesh = mesh;
            wordGroup.userData.baseZ = baseZ;
            wordGroup.userData.floatSpeed = 0.6 + Math.random() * 0.8;
            wordGroup.userData.floatAmp = 0.03 + Math.random() * 0.04;
            wordGroup.userData.floatPhase = Math.random() * Math.PI * 2;

            ringGroup.add(wordGroup);
            textSprites.push(wordGroup);
        }

        systemGroup.add(ringGroup); 

        // 5. FONDO ESTELAR
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 10000;
        const starsVertices = [];
        const starsColors = [];
        for (let i = 0; i < starsCount; i++) {
            const theta = Math.random() * Math.PI * 2; const phi = Math.acos(2 * Math.random() - 1); const radius = 80 + Math.random() * 200;
            starsVertices.push(radius * Math.sin(phi) * Math.cos(theta), radius * Math.sin(phi) * Math.sin(theta), radius * Math.cos(phi));
            const brightness = 0.5 + Math.random() * 0.5;
            starsColors.push(brightness, brightness, brightness + Math.random() * 0.2); 
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        starsGeometry.setAttribute('color', new THREE.Float32BufferAttribute(starsColors, 3));
        const starsMaterial = new THREE.PointsMaterial({ size: 0.2, vertexColors: true, transparent: true, opacity: 0.9, sizeAttenuation: true });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // 6. ESTRELLAS FUGACES
        const shootingStars = [];
        for (let i = 0; i < 4; i++) {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(6);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            shootingStars.push({ line: line, active: false, velocity: new THREE.Vector3(), head: new THREE.Vector3(), life: 0, maxLife: 0, length: 0 });
        }

        function activateShootingStar(star) {
            star.active = true; star.life = 0; star.maxLife = 0.8 + Math.random() * 1.0; star.length = 3 + Math.random() * 4;
            const theta = Math.random() * Math.PI * 2; const phi = Math.acos(2 * Math.random() - 1); const r = 30 + Math.random() * 40;
            star.head.set(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
            star.velocity.copy(star.head).normalize().negate();
            star.velocity.x += (Math.random() - 0.5); star.velocity.y += (Math.random() - 0.5); star.velocity.z += (Math.random() - 0.5);
            star.velocity.normalize().multiplyScalar(30 + Math.random() * 40);
        }

        function updateShootingStars(delta) {
            for (let i = 0; i < shootingStars.length; i++) {
                const star = shootingStars[i];
                if (!star.active) { if (Math.random() < 0.005) activateShootingStar(star); continue; }
                star.life += delta;
                if (star.life > star.maxLife) { star.active = false; star.line.material.opacity = 0; continue; }
                star.head.add(star.velocity.clone().multiplyScalar(delta));
                const tail = star.head.clone().sub(star.velocity.clone().normalize().multiplyScalar(star.length));
                const positions = star.line.geometry.attributes.position.array;
                positions[0] = star.head.x; positions[1] = star.head.y; positions[2] = star.head.z;
                positions[3] = tail.x; positions[4] = tail.y; positions[5] = tail.z;
                star.line.geometry.attributes.position.needsUpdate = true;
                const lifeRatio = star.life / star.maxLife;
                if (lifeRatio < 0.1) star.line.material.opacity = lifeRatio / 0.1;
                else if (lifeRatio > 0.6) star.line.material.opacity = (1 - lifeRatio) / 0.4;
                else star.line.material.opacity = 1.0;
            }
        }

        // 7. ANIMACIÓN CONSTANTE
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();

            planet.rotation.y += delta * 0.4; 
            atmosphere.rotation.y += delta * 0.45;

            // El anillo gira como un todo, y las palabras flotan suavemente sobre él
            ringGroup.rotation.z += delta * 0.15;

            textSprites.forEach(group => {
                const t = elapsedTime * group.userData.floatSpeed + group.userData.floatPhase;
                group.userData.mesh.position.z = group.userData.baseZ + Math.sin(t) * group.userData.floatAmp;
                group.userData.mesh.material.opacity = 0.75 + Math.sin(t * 1.3) * 0.2;
            });

            updateShootingStars(delta);

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // 8. AJUSTE DE VENTANA
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        } catch (e) {
            showError('Error al construir la escena: ' + e.message);
            console.error(e);
        }
    </script>
</body>
</html>
